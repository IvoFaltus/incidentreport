<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js" type="module"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<header class="bg-dark text-white text-center py-3 mb-4">
    <h1 class="mb-0">Incident Report</h1>
</header>

<main class="container">

    <!-- CREATE REPORT -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Create Report</h4>

            <form id="saveForm" class="row g-3" onsubmit="return false">

                <div class="col-12">
                    <label class="form-label mb-1">Photo</label>
                    <div class="d-flex gap-2 flex-wrap align-items-center">
                        <input id="incidentImageFile" class="form-control flex-grow-1" type="file" name="file1" accept="image/*" capture="environment">
                        <button id="openWebcamBtn" type="button" class="btn btn-outline-secondary">Take photo now</button>
                    </div>
                    <input type="hidden" name="capturedImageBase64" id="capturedImageBase64" value="">
                    <div class="form-text">Choose a file, or capture with webcam.</div>
                    <img id="imagePreview" class="incident-image-preview mt-2 d-none" alt="Selected photo preview">

                    <div id="webcamContainer" class="card mt-3 shadow-sm d-none">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                                <div class="fw-semibold">Camera</div>
                                <button id="webcamCloseBtn" type="button" class="btn btn-sm btn-outline-secondary">Close</button>
                            </div>

                            <video id="webcamVideo" class="w-100 bg-dark webcam-video" autoplay playsinline></video>
                            <canvas id="webcamCanvas" class="d-none"></canvas>
                            <img id="webcamPhotoPreview" class="incident-image-preview mt-2 d-none" alt="Captured photo preview">

                            <div class="d-flex gap-2 flex-wrap mt-3">
                                <button id="webcamStartBtn" type="button" class="btn btn-primary">Start webcam</button>
                                <button id="webcamCaptureBtn" type="button" class="btn btn-success" disabled>Capture</button>
                                <button id="webcamUseBtn" type="button" class="btn btn-outline-dark" disabled>Use photo</button>
                            </div>
                            <div id="webcamStatus" class="form-text mt-2"></div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Report Name" type="text" name="reporterName">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Email" type="text" name="reporterEmail">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Category" type="text" name="category">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Location" type="text" name="location">
                </div>

                <div class="col-12">
                    <input class="form-control" placeholder="Description" type="text" name="description">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="GPS (50.087, 14.421)" type="text" name="gps" pattern="\s*-?\d{1,2}(?:\.\d+)?\s*,\s*-?\d{1,3}(?:\.\d+)?\s*" title="Use format: 50.087, 14.421">
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-primary">Submit</button>
                </div>

            </form>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Search</h4>

            <form id="filterForm" class="row g-3" onsubmit="return false">

                <div class="col-md-4">
                    <input class="form-control" placeholder="Incident Name" name="reporterName">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Incident Email" name="reporterEmail">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Category" name="category">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Location" name="location">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Description" name="description">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="GPS (50.087, 14.421)" name="gps" pattern="\s*-?\d{1,2}(?:\.\d+)?\s*,\s*-?\d{1,3}(?:\.\d+)?\s*" title="Use format: 50.087, 14.421">
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-success">Search</button>
                </div>

            </form>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Map</h4>
            <div id="map" class="map"></div>
            <div class="form-text">Uses GPS from Search (or first filtered incident).</div>
        </div>
    </div>

    <!-- LIST -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title">Results</h4>
            <div class="list"></div>
        </div>
    </div>

</main>

</body>
</html>
