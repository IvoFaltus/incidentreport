<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js" type="module"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<header class="bg-dark text-white text-center py-3 mb-4">
    <h1 class="mb-0">Incident Report</h1>
</header>

<main class="container">

    <!-- CREATE REPORT -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Create Report</h4>

            <form id="saveForm" class="row g-3">

                <div class="col-12">
                    <input class="form-control" type="file" name="file1" accept="image/*" capture="environment">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Report Name" type="text" name="reportName">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Email" type="text" name="reportEmail">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Category" type="text" name="category">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Location" type="text" name="location">
                </div>

                <div class="col-12">
                    <input class="form-control" placeholder="Description" type="text" name="description">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="Image Base64" type="text" name="imageBase64">
                </div>

                <div class="col-md-6">
                    <input class="form-control" placeholder="GPS" type="text" name="gps">
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-primary">Submit</button>
                </div>

            </form>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Search</h4>

            <form id="filterForm" class="row g-3">

                <div class="col-md-4">
                    <input class="form-control" placeholder="Incident Name" name="reportName">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Incident Email" name="reportEmail">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Category" name="category">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Location" name="location">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="Description" name="description">
                </div>

                <div class="col-md-4">
                    <input class="form-control" placeholder="GPS" name="gps">
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-success">Search</button>
                </div>

            </form>
        </div>
    </div>



    
<script>

const o = Object.fromEntries(new FormData($("#saveForm")[0]))



const fileInput = $("input[type=file]")[0]


const sendData = async()=>{
    const URL = "http://wa3lm.dev.spsejecna.net/incident/api.php"

    
let files1 =(fileInput.files.length!=0) ? Array.from(fileInput.files).slice(0, 3):[];

const promises = files1.map(file => {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // already Base64
    reader.readAsDataURL(file);
  });
});

let files2 = await Promise.all(promises)

const payload = {
    reportName:o.reportName,
    reportEmail:o.reportEmail,
    category:o.category,
    location:o.location,
    description:o.description,
    imageBase64:files2,
    gps:o.gps
}



    console.log("sending post")
const res =await fetch(URL,{
method: "POST",
headers: {

    "Content-Type":"application/json"
},
body:JSON.stringify(payload)


})

return res
}

$("#saveForm").submit(async()=>{

    const res = await sendData()
    const data = await res.json()
    console.log("data,",data)
})



</script>

    <!-- LIST -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title">Results</h4>
            <div class="list"></div>
        </div>
    </div>

</main>

</body>
</html>
