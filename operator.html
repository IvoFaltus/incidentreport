<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report - Operator</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="operator.js" type="module"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="text-white text-center py-3 mb-4">
    <h1 class="mb-0">Incident Operator</h1>
</header>

<main class="container">

    <div class="d-flex justify-content-end mb-3">
        <a class="btn btn-outline-secondary" href="index.html">Post incident</a>
    </div>

    <!-- SEARCH -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Search</h4>

            <form id="filterForm" class="row g-3" onsubmit="return false">

                <div class="col-md-4">
                    <input class="form-control" id="id-name" placeholder="Reporter's Name" name="reporterName">
                </div>

                <div class="col-md-4">
                    <input class="form-control" id="id-email" placeholder="Reporter's Email" name="reporterEmail">
                </div>

                <div class="col-md-4">
                    <input class="form-control" id="id-category" placeholder="Category" name="category">
                </div>

                <div class="col-md-4">
                    <input class="form-control" id="id-location"  placeholder="Location" name="location">
                </div>

                <div class="col-md-4">
                    <input class="form-control" id="id-description"   placeholder="Description" name="description">
                </div>

                <div class="col-md-4">
                    <input class="form-control"  id="id-gps"   placeholder="GPS (50.087, 14.421)" name="gps" pattern="\s*-?\d{1,2}(?:\.\d+)?\s*,\s*-?\d{1,3}(?:\.\d+)?\s*" title="Use format: 50.087, 14.421">
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-success localsearch" type="submit">Search locally</button>
                    <button class="btn btn-success dbsearch">Search from database</button>
                </div>

            </form>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3">Map</h4>
            <div id="map" class="map"></div>
            <div class="form-text">Uses GPS from Search (or first filtered incident).</div>
        </div>
    </div>

    <!-- LIST -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title">Results</h4>
            <div class="list listdiv"></div>
        </div>
    </div>

</main>

</body>
</html>
