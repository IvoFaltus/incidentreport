<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Capture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #videoElement, #photoElement { max-width: 100%; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-light">
<main class="container py-3">
    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
        <h1 class="h4 mb-0">Webcam Capture</h1>
        <a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <video id="videoElement" autoplay playsinline class="w-100 bg-dark"></video>

            <div class="d-flex gap-2 flex-wrap mt-3">
                <button id="startButton" class="btn btn-primary" type="button">Start webcam</button>
                <button id="captureButton" class="btn btn-success" type="button" disabled>Capture photo</button>
                <button id="useButton" class="btn btn-outline-dark" type="button" disabled>Use this photo</button>
            </div>

            <canvas id="canvasElement" class="d-none"></canvas>
            <img id="photoElement" class="mt-3 d-none" alt="Captured photo preview">
            <p id="output" class="form-text mt-2"></p>
        </div>
    </div>
</main>

<script>
const videoElement = document.getElementById("videoElement");
const canvasElement = document.getElementById("canvasElement");
const photoElement = document.getElementById("photoElement");
const startButton = document.getElementById("startButton");
const captureButton = document.getElementById("captureButton");
const useButton = document.getElementById("useButton");
const output = document.getElementById("output");

let stream = null;
let lastCaptureDataUrl = "";

const stopWebcam = () => {
    if (!stream) return;
    for (const track of stream.getTracks()) track.stop();
    stream = null;
    videoElement.srcObject = null;
};

async function startWebcam() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false,
        });
        videoElement.srcObject = stream;
        startButton.disabled = true;
        captureButton.disabled = false;
        if (output) output.textContent = "";
    } catch (error) {
        console.error("Error accessing webcam:", error);
        if (output) output.textContent = "Webcam permission denied or unavailable.";
    }
}

function capturePhoto() {
    if (!videoElement.videoWidth || !videoElement.videoHeight) return;

    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;

    const ctx = canvasElement.getContext("2d");
    ctx.drawImage(videoElement, 0, 0);

    lastCaptureDataUrl = canvasElement.toDataURL("image/jpeg", 0.9);
    photoElement.src = lastCaptureDataUrl;
    photoElement.classList.remove("d-none");
    useButton.disabled = false;

    if (output) output.textContent = 'Captured. Click "Use this photo" to send it to the report form.';
}

function usePhoto() {
    if (!lastCaptureDataUrl) return;
    try { localStorage.setItem("imgData", lastCaptureDataUrl); } catch {}

    if (window.opener && !window.opener.closed) {
        try {
            window.opener.postMessage(
                { type: "incidentapp:webcam_capture", dataUrl: lastCaptureDataUrl },
                window.location.origin
            );
        } catch {
            window.opener.postMessage(
                { type: "incidentapp:webcam_capture", dataUrl: lastCaptureDataUrl },
                "*"
            );
        }
    }

    stopWebcam();
    window.close();
}

startButton.addEventListener("click", startWebcam);
captureButton.addEventListener("click", capturePhoto);
useButton.addEventListener("click", usePhoto);

window.addEventListener("beforeunload", stopWebcam);
</script>
</body>
</html>
